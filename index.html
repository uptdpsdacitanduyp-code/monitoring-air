<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Monitoring Air Lengkap - 10 Bendung</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        
        .header-uptd { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 25px; 
            border-bottom: 3px solid #2196F3; 
            padding-bottom: 15px; 
            text-align: center; 
        }
        
        .logo-uptd-img { width: 80px; height: auto; }
        
        .titles-container { 
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .main-title { margin: 0; color: #1a237e; font-size: 24px; text-transform: uppercase; }
        .sub-title { margin: 0; color: #555; font-size: 18px; font-weight: normal; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .btn-admin { padding: 10px 20px; background: #2196F3; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-admin:hover { background: #1976D2; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; table-layout: fixed; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; font-size: 11px; word-wrap: break-word; }
        th { background-color: #e3f2fd; color: #333; font-weight: bold; text-transform: uppercase; height: 60px;}

        .img-bendung { 
            width: 100px; height: 70px; 
            object-fit: cover; border-radius: 4px; border: 1px solid #ddd;
            cursor: pointer; transition: 0.3s;
        }
        .img-bendung:hover { opacity: 0.8; }

        input[type="number"] { width: 90%; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 4px; font-size: 11px;}
        input:focus { border-color: #2196F3; outline: none; box-shadow: 0 0 5px rgba(33,150,243,0.3); }

        /* Style untuk kolom hasil otomatis agar terlihat berbeda */
        .col-readonly { background-color: #f9f9f9; font-weight: bold; color: #333; }

        .btn-save { 
            padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: bold; width: 100%; margin-top: 25px; font-size: 16px; 
            transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-save:hover { background: #1b5e20; }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }

        #imageModal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center; flex-direction: column;
        }
        #modalImg { max-width: 85%; max-height: 75%; border: 5px solid white; border-radius: 8px; }
        
        .status-cukup { background-color: #c6efce; color: #006100; font-weight: bold; }
        .status-kurang { background-color: #ffc7ce; color: #9c0006; font-weight: bold; }
    </style>
</head>
<body>

<div id="imageModal" onclick="tutupModal()">
    <span style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;">&times;</span>
    <img id="modalImg" src="">
    <p id="caption" style="color: white; margin-top: 15px; font-size: 18px; font-weight: bold;"></p>
</div>

<div class="container">
    <div class="header-uptd">
        <img src="img/g2.png" alt="Logo" class="logo-uptd-img" onerror="this.src='https://via.placeholder.com/80?text=LOGO'">
        <div class="titles-container">
            <h1 class="main-title">CAI TEPI SAWAH</h1>
            <h2 class="sub-title">UPTD PSDA WS CITANDUY</h2>
        </div>
    </div>
    
    <div class="controls">
        <a href="admin.html" class="btn-admin">← LIHAT REKAP ADMIN</a>
        <div>
            <label style="font-weight:bold;">Tanggal Laporan: </label>
            <input type="date" id="tgl_input" style="padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th width="35px">NO</th>
                    <th width="150px">NAMA BENDUNG & FOTO</th>
                    <th width="80px">KEBUTUHAN<br>(m³/dtk)</th>
                    <th width="80px">KETERSEDIAAN<br>(m³/dtk)</th>
                    <th width="90px">JUMLAH KEKURANGAN / KELEBIHAN DEBIT AIR</th>
                    <th width="110px">KETERANGAN</th>
                    <th width="80px">PENGOLAH TANAH<br>(Ha)</th>
                    <th width="80px">PERTUMBUHAN<br>(Ha)</th>
                    <th width="80px">PANEN<br>(Ha)</th>
                    <th width="100px">LUAS LAYANAN<br>(Ha)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <button class="btn-save" id="btnSimpan" onclick="simpanKeSupabase()">SIMPAN SEMUA DATA KE DATABASE</button>
</div>

<script>
    const SUPABASE_URL = 'https://bgreqgputsaocwaloirj.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncmVxZ3B1dHNhb2N3YWxvaXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk0NjIsImV4cCI6MjA5MDQzNTQ2Mn0.v4npuC4Pw3ftAuL4p7MH1HQNppBrVqWnc_zWv40JrDg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('tgl_input').valueAsDate = new Date();

    const daftarBendung = [
        "BENDUNG CIMULU", "BENDUNG CIGEDE", "BENDUNG MUHARA", "BENDUNG BARANANGSIANG", "BENDUNG CIKEMBANG", 
        "BENDUNG CIPUTRAHAJI", "BENDUNG GUNUNG PUTRI", "BENDUNG WANGUNDIREJA", "BENDUNG LAKSANA HARJA", "BENDUNG PARAKAN HAJI"
    ];

    function renderTabel() {
        const tbody = document.getElementById('tableBody');
        let htmlContent = "";
        
        daftarBendung.forEach((nama, i) => {
            let imageNum = i + 1;
            if (imageNum === 9) imageNum = 10;
            else if (imageNum === 10) imageNum = 9;

            const fullUrl = "img/" + imageNum + ".jpeg";

            htmlContent += `
                <tr class="row-data">
                    <td>${i + 1}</td>
                    <td>
                        <div style="display:flex; flex-direction:column; align-items:center; gap:5px; padding: 5px 0;">
                            <img src="${fullUrl}" class="img-bendung" 
                                 onclick="zoomGambar('${fullUrl}', '${nama}')"
                                 onerror="this.src='https://via.placeholder.com/120x80?text=Tanpa+Foto'">
                            <span class="nama-text" style="font-weight:bold; font-size:10px;">${nama}</span>
                        </div>
                    </td>
                    <td><input type="number" step="0.01" class="inp-butuh" value="0.00" oninput="hitung(this)"></td>
                    <td><input type="number" step="0.01" class="inp-sedia" value="0.00" oninput="hitung(this)"></td>
                    <td class="col-selisih" style="font-weight:bold;">0.00</td>
                    <td class="col-status status-cukup">CUKUP</td>
                    <td><input type="number" step="0.01" class="inp-olah" value="0.00" oninput="hitung(this)"></td>
                    <td><input type="number" step="0.01" class="inp-tumbuh" value="0.00" oninput="hitung(this)"></td>
                    <td><input type="number" step="0.01" class="inp-panen" value="0.00" oninput="hitung(this)"></td>
                    <td class="col-luas-total col-readonly">0.00</td>
                </tr>`;
        });
        tbody.innerHTML = htmlContent;
    }

    function hitung(el) {
        const row = el.closest('tr');
        
        // 1. Hitung Selisih Air
        const butuh = parseFloat(row.querySelector('.inp-butuh').value) || 0;
        const sedia = parseFloat(row.querySelector('.inp-sedia').value) || 0;
        const selisih = (sedia - butuh).toFixed(2);
        
        const colSelisih = row.querySelector('.col-selisih');
        const colStatus = row.querySelector('.col-status');
        
        colSelisih.innerText = (selisih > 0 ? "+" : "") + selisih;
        
        if (parseFloat(selisih) < 0) {
            colStatus.innerText = "KURANG AIR";
            colStatus.className = "col-status status-kurang";
        } else {
            colStatus.innerText = "CUKUP";
            colStatus.className = "col-status status-cukup";
        }

        // 2. Hitung Total Luas Layanan (Olah + Tumbuh + Panen)
        const olah = parseFloat(row.querySelector('.inp-olah').value) || 0;
        const tumbuh = parseFloat(row.querySelector('.inp-tumbuh').value) || 0;
        const panen = parseFloat(row.querySelector('.inp-panen').value) || 0;
        
        const totalLuas = (olah + tumbuh + panen).toFixed(2);
        row.querySelector('.col-luas-total').innerText = totalLuas;
    }

    function zoomGambar(url, txt) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const caption = document.getElementById('caption');
        modal.style.display = "flex";
        modalImg.src = url;
        caption.innerText = txt;
    }

    function tutupModal() { 
        document.getElementById('imageModal').style.display = "none"; 
    }

    async function simpanKeSupabase() {
        const tgl = document.getElementById('tgl_input').value;
        if (!tgl) {
            alert("Silakan pilih tanggal terlebih dahulu!");
            return;
        }

        if (!confirm("Apakah Anda yakin ingin menyimpan data ini?")) return;

        const rows = document.querySelectorAll('.row-data');
        const payload = Array.from(rows).map(row => ({
            tanggal: tgl,
            bendungan_dan_foto: row.querySelector('.nama-text').innerText,
            kebutuhan: parseFloat(row.querySelector('.inp-butuh').value) || 0,
            ketersediaan: parseFloat(row.querySelector('.inp-sedia').value) || 0,
            selisih: parseFloat(row.querySelector('.col-selisih').innerText.replace('+', '')) || 0,
            luas_layanan: parseFloat(row.querySelector('.col-luas-total').innerText) || 0,
            pengolahan_tanah: parseFloat(row.querySelector('.inp-olah').value) || 0,
            pertumbuhan: parseFloat(row.querySelector('.inp-tumbuh').value) || 0,
            panen: parseFloat(row.querySelector('.inp-panen').value) || 0,
            keterangan: row.querySelector('.col-status').innerText
        }));

        const btn = document.getElementById('btnSimpan');
        btn.innerText = "⏳ SEDANG MENYIMPAN...";
        btn.disabled = true;

        try {
            const { error } = await _supabase.from('laporan_air').insert(payload);
            if (error) throw error;
            alert("✅ Berhasil! Data telah disimpan.");
        } catch (err) {
            alert("❌ Gagal Simpan: " + err.message);
        } finally {
            btn.innerText = "SIMPAN SEMUA DATA KE DATABASE";
            btn.disabled = false;
        }
    }

    window.onload = renderTabel;
</script>
</body>
</html>
