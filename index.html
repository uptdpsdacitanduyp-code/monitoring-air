<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Monitoring Air Lengkap - PKL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 13px; }
        th { background-color: #f8f9fa; position: sticky; top: 0; z-index: 10; }
        .section-header { background-color: #d3d3d3 !important; font-weight: bold; font-style: italic; font-size: 14px; }
        input { width: 85%; padding: 4px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }
        .status-cukup { background-color: #c6efce !important; color: #006100; font-weight: bold; }
        .status-kurang { background-color: #ffc7ce !important; color: #9c0006; font-weight: bold; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-save { padding: 12px 25px; background: #3ecf8e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-admin { padding: 10px 15px; background: #2196F3; color: white; text-decoration: none; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Input Kebutuhan dan Ketersediaan Air</h2>
    
    <div class="controls">
        <a href="admin.html" class="btn-admin">Lihat Rekap Admin →</a>
        <div>
            <label>Tanggal: </label>
            <input type="date" id="tgl_input" style="width: auto; margin-right: 10px;">
            <button class="btn-save" onclick="simpanKeSupabase()">SIMPAN SEMUA DATA</button>
        </div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th width="5%">NO</th>
                <th width="20%">NAMA BENDUNG</th>
                <th width="15%">LUAS LAYANAN (HEKTAR)</th>
                <th width="15%">PENGELOLAHAN TANAH</th>
                <th width="20%">PERTUMBUHAN</th>
                <th width="25%">PANEN</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // --- PERBAIKAN DI SINI ---
    // URL harus diawali https:// dan diakhiri .supabase.co
    const SUPABASE_URL = 'https://bgreqgputsaocwaloirj.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncmVxZ3B1dHNhb2N3YWxvaXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk0NjIsImV4cCI6MjA5MDQzNTQ2Mn0.v4npuC4Pw3ftAuL4p7MH1HQNppBrVqWnc_zWv40JrDg';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('tgl_input').valueAsDate = new Date();

    const dataAir = [
        { type: 'header', label: '' },
        ...Array.from({length: 30}, (_, i) => ({ no: i+1, nama: `BCMU - ${i+1}` })),
        { type: 'header', label: '' },
        ...Array.from({length: 5}, (_, i) => ({ no: i+1, nama: `BDS - ${i+1}` })),
        { type: 'header', label: '' },
        ...Array.from({length: 4}, (_, i) => ({ no: i+1, nama: `BCH - ${i+1}` }))
    ];

    function renderTabel() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        dataAir.forEach(item => {
            if (item.type === 'header') {
                tbody.innerHTML += `<tr class="section-header"><td colspan="6">${item.label}</td></tr>`;
            } else {
                tbody.innerHTML += `
                    <tr class="row-data">
                        <td>${item.no}</td>
                        <td class="nama-bangunan">${item.nama}</td>
                        <td><input type="number" step="0.01" class="inp-butuh" value="0.00" oninput="hitung(this)"></td>
                        <td><input type="number" step="0.01" class="inp-sedia" value="0.00" oninput="hitung(this)"></td>
                        <td class="col-selisih">0.00</td>
                        <td class="col-status status-cukup">CUKUP</td>
                    </tr>`;
            }
        });
    }

    function hitung(el) {
        const row = el.closest('tr');
        const butuh = parseFloat(row.querySelector('.inp-butuh').value) || 0;
        const sedia = parseFloat(row.querySelector('.inp-sedia').value) || 0;
        const selisih = (sedia - butuh).toFixed(2);
        const isCukup = parseFloat(selisih) >= 0;
        
        row.querySelector('.col-selisih').innerText = (isCukup ? '+' : '') + selisih;
        const colStatus = row.querySelector('.col-status');
        colStatus.innerText = isCukup ? 'CUKUP' : 'KURANG AIR';
        colStatus.className = `col-status ${isCukup ? 'status-cukup' : 'status-kurang'}`;
    }

    async function simpanKeSupabase() {
        const tgl = document.getElementById('tgl_input').value;
        const rows = document.querySelectorAll('.row-data');
        const payload = [];

        rows.forEach(row => {
            const selisihText = row.querySelector('.col-selisih').innerText;
            payload.push({
                tanggal: tgl,
                nama_bangunan: row.querySelector('.nama-bangunan').innerText,
                kebutuhan: parseFloat(row.querySelector('.inp-butuh').value) || 0,
                ketersediaan: parseFloat(row.querySelector('.inp-sedia').value) || 0,
                selisih: parseFloat(selisihText) || 0,
                status: row.querySelector('.col-status').innerText
            });
        });

        // Tampilkan loading sederhana
        const btn = document.querySelector('.btn-save');
        btn.innerText = "PROSES SIMPAN...";
        btn.disabled = true;

        const { error } = await _supabase.from('laporan_air').insert(payload);
        
        btn.innerText = "SIMPAN SEMUA DATA";
        btn.disabled = false;

        if (error) {
            alert("Gagal: " + error.message);
            console.error(error);
        } else {
            alert("Berhasil simpan semua data!");
        }
    }

    // Panggil fungsi setelah semua script siap
    window.onload = renderTabel;
</script>
</body>
</html>
