<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rekap Data Air & Lahan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1600px; margin: auto; }
        
        .header-logo { text-align: center; margin-bottom: 20px; border-bottom: 3px solid #2196F3; padding-bottom: 15px; }
        .header-logo img { width: 70px; height: auto; margin-bottom: 10px; }
        .header-logo h1 { margin: 0; color: #0d47a1; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .header-logo p { margin: 2px 0; color: #555; font-size: 14px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 10px; word-wrap: break-word; }
        th { background: #e3f2fd; color: #333; text-transform: uppercase; height: 50px; }
        
        .nama-foto-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        
        .img-admin { 
            width: 110px; height: 70px; 
            object-fit: cover; border-radius: 6px; border: 1px solid #ccc;
        }

        .filter-box { margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #ddd; display: flex; gap: 10px; align-items: center; justify-content: center; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-outline { background: white; border: 1px solid #ddd; color: #333; }

        .tag-tgl { background: #333; color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-bottom: 4px; }

        @media print {
            @page { size: A4 landscape; margin: 0.5cm; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            .no-print, .btn, .filter-box { display: none !important; }
            table { width: 100%; border: 1px solid #000; }
            th { background: #f2f2f2 !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
            td { font-size: 9px; padding: 4px; }
            .img-admin { width: 100px; height: 65px; border: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="img/g2.png" onerror="this.src='https://via.placeholder.com/70?text=LOGO'">
        <h1>REKAPITULASI CAI TEPI SAWAH</h1>
        <p>UPTD PSDA WS CITANDUY</p>
    </div>

    <div class="no-print" style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
        <a href="index.html" class="btn btn-outline">← Form Input Data</a>
        <button class="btn btn-blue" onclick="window.print()">Cetak Laporan (PDF)</button>
        <button class="btn btn-red" onclick="hapusSemuaData()">Hapus Semua Data</button>
    </div>

    <div class="filter-box no-print">
        <label><b>Filter Berdasarkan Tanggal:</b></label>
        <input type="date" id="filterTgl">
        <button class="btn btn-blue" onclick="muatData()">Cari Data</button>
        <button class="btn btn-outline" onclick="resetFilter()">Tampilkan Semua</button>
    </div>

    <div style="overflow-x: auto;">
        <table id="tabelRekap">
            <thead>
                <tr>
                    <th width="35px">NO</th>
                    <th width="150px">TANGGAL & NAMA BENDUNG</th>
                    <th width="80px">KEBUTUHAN<br>(L/dtk)</th>
                    <th width="80px">KETERSEDIAAN<br>(L/dtk)</th>
                    <th width="90px">JUMLAH KEKURANGAN / KELEBIHAN</th>
                    <th width="100px">KETERANGAN</th>
                    <th width="80px">PENGOLAHAN TANAH</th>
                    <th width="80px">PERTUMBUHAN</th>
                    <th width="80px">PANEN</th>
                    <th width="90px">LUAS TOTAL<br>(HA)</th>
                </tr>
            </thead>
            <tbody id="adminBody">
                <tr><td colspan="10">Memuat data dari database...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bgreqgputsaocwaloirj.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncmVxZ3B1dHNhb2N3YWxvaXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk0NjIsImV4cCI6MjA5MDQzNTQ2Mn0.v4npuC4Pw3ftAuL4p7MH1HQNppBrVqWnc_zWv40JrDg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Daftar ini harus sama persis urutannya dengan index.html untuk pencocokan gambar
    const daftarBendung = [
        "BENDUNG CIMULU", "BENDUNG LAKSANAHARJA", "BENDUNG CIKEMBANG", "BENDUNG BARANANGSIANG", "BENDUNG GUNUNG PUTRI", 
        "BENDUNG CIPUTRAHAJI", "BENDUNG WANGUNDIREJA", "BENDUNG MUHARA", "BENDUNG CIGEDE", "FREE INTAKE PARAKANHAJI"
    ];

    async function muatData() {
        const filter = document.getElementById('filterTgl').value;
        const tbody = document.getElementById('adminBody');
        tbody.innerHTML = `<tr><td colspan="10">⏳ Memproses data...</td></tr>`;

        let query = _supabase.from('laporan_air').select('*').order('tanggal', { ascending: false }).order('bendungan_dan_foto', { ascending: true });
        
        if (filter) query = query.eq('tanggal', filter);

        const { data, error } = await query;

        if (error) { 
            tbody.innerHTML = `<tr><td colspan="10" style="color:red">Error: ${error.message}</td></tr>`; 
            return; 
        }

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10">Belum ada data tersimpan untuk periode ini.</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map((item, index) => {
            const namaBendung = item.bendungan_dan_foto || "-";
            
            // Cari index bendung untuk menentukan gambar yang benar
            let idx = daftarBendung.findIndex(d => namaBendung.toUpperCase() === d.toUpperCase());
            
            // Logika urutan gambar (Sesuai dengan Form Input)
            let imageNum = idx + 1;
            if (imageNum === 9) imageNum = 10; 
            else if (imageNum === 10) imageNum = 9;

            let fotoUrl = (idx !== -1) ? `img/${imageNum}.jpeg` : 'https://via.placeholder.com/100x70?text=No+Photo';

            return `
            <tr>
                <td>${index + 1}</td>
                <td>
                    <div class="nama-foto-cell">
                        <span class="tag-tgl">${item.tanggal}</span>
                        <img src="${fotoUrl}" class="img-admin" onerror="this.src='https://via.placeholder.com/100x70?text=No+Photo'">
                        <strong style="font-size:9px;">${namaBendung}</strong>
                    </div>
                </td>
                <td>${parseFloat(item.kebutuhan || 0).toFixed(2)}</td>
                <td>${parseFloat(item.ketersediaan || 0).toFixed(2)}</td>
                <td style="font-weight:bold; color:${item.selisih < 0 ? '#d32f2f' : '#2e7d32'}">
                    ${item.selisih > 0 ? '+' : ''}${parseFloat(item.selisih || 0).toFixed(2)}
                </td>
                <td style="background:${item.keterangan === 'CUKUP' ? '#e8f5e9' : '#ffebee'}">
                    <b style="color:${item.keterangan === 'CUKUP' ? '#2e7d32' : '#c62828'}">${item.keterangan || '-'}</b>
                </td>
                <td>${parseFloat(item.pengolahan_tanah || 0).toFixed(2)}</td>
                <td>${parseFloat(item.pertumbuhan || 0).toFixed(2)}</td>
                <td>${parseFloat(item.panen || 0).toFixed(2)}</td>
                <td style="font-weight:bold; background:#fcfcfc;">${parseFloat(item.luas_layanan || 0).toFixed(2)}</td>
            </tr>`;
        }).join('');
    }

    async function hapusSemuaData() {
        const password = prompt("PERINGATAN: Semua data akan terhapus selamanya!\nKetik 'HAPUS' untuk mengonfirmasi:");
        if (password === "HAPUS") {
            const { error } = await _supabase.from('laporan_air').delete().neq('id', 0);
            if (error) {
                alert("Gagal menghapus: " + error.message);
            } else {
                alert("✅ Semua data berhasil dibersihkan.");
                muatData();
            }
        }
    }

    function resetFilter() {
        document.getElementById('filterTgl').value = "";
        muatData();
    }

    // Jalankan saat halaman dibuka
    window.onload = muatData;
</script>
</body>
</html>
