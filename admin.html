<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rekap Data Air & Lahan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1450px; margin: auto; }
        
        /* Header Logo Style */
        .header-logo { text-align: center; margin-bottom: 20px; border-bottom: 3px solid #2196F3; padding-bottom: 15px; }
        .header-logo img { width: 80px; height: auto; }
        .header-logo h1 { margin: 5px 0; color: #0d47a1; font-size: 24px; text-transform: uppercase; }
        .header-logo p { margin: 0; font-weight: bold; color: #555; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 10px; word-wrap: break-word; }
        th { background: #f2f2f2; color: #333; text-transform: uppercase; height: 40px; }
        
        .img-admin { width: 80px; height: 55px; object-fit: cover; border-radius: 4px; border: 1px solid #ccc; }

        .filter-box { margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #ddd; display: flex; gap: 10px; align-items: center; justify-content: center; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; text-decoration: none; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-outline { background: white; border: 1px solid #ddd; color: #333; }

        /* --- CSS KHUSUS CETAK PDF AGAR TIDAK TERPOTONG --- */
        @media print {
            @page { 
                size: A4 landscape; /* Paksa landscape agar tabel lebar muat */
                margin: 1cm; 
            }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            .filter-box, .btn, .col-aksi, a, #imageModal { display: none !important; }
            
            table { width: 100%; border: 1px solid #000; }
            th, td { font-size: 9px; padding: 4px; } /* Perkecil font saat cetak */
            .header-logo { display: block !important; border-bottom: 2px solid #000; }
            
            /* Hindari tabel terpotong di tengah baris */
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Logo_PUPR.png" alt="Logo"> <h1>CAI TEPI SAWAH</h1>
        <p>UPTD PSDA WS CITANDUY</p>
    </div>

    <div style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;" class="no-print">
        <a href="index.html" class="btn btn-outline">← Kembali ke Form Input</a>
        <button class="btn btn-blue" onclick="window.print()">Cetak Laporan (PDF)</button>
        <button class="btn btn-red" onclick="hapusSemuaData()">Hapus Semua Rekap</button>
    </div>

    <div class="filter-box no-print">
        <label>Filter Tanggal: </label>
        <input type="date" id="filterTgl">
        <button class="btn btn-blue" onclick="muatData()">Cari Data</button>
    </div>

    <div style="overflow-x: auto;">
        <table id="tabelRekap">
            <thead>
                <tr>
                    <th width="30px">NO</th>
                    <th width="150px">NAMA BENDUNG & FOTO</th>
                    <th>KEBUTUHAN<br>(l/dtk)</th>
                    <th>KETERSEDIAAN<br>(l/dtk)</th>
                    <th>+/-</th>
                    <th>LUAS LAYANAN</th>
                    <th>OLAH TANAH</th>
                    <th>TUMBUH</th>
                    <th>PANEN</th>
                    <th width="70px">KET</th>
                    <th width="50px" class="col-aksi">AKSI</th>
                </tr>
            </thead>
            <tbody id="adminBody">
                <tr><td colspan="11">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bgreqgputsaocwaloirj.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncmVxZ3B1dHNhb2N3YWxvaXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk0NjIsImV4cCI6MjA5MDQzNTQ2Mn0.v4npuC4Pw3ftAuL4p7MH1HQNppBrVqWnc_zWv40JrDg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function muatData() {
        const filter = document.getElementById('filterTgl').value;
        const tbody = document.getElementById('adminBody');
        tbody.innerHTML = `<tr><td colspan="11">Mengambil data...</td></tr>`;

        let query = _supabase.from('laporan_air').select('*').order('tanggal', { ascending: false });
        if (filter) query = query.eq('tanggal', filter);

        const { data, error } = await query;
        if (error) { tbody.innerHTML = `<tr><td colspan="11">Error: ${error.message}</td></tr>`; return; }

        const daftar = ["CIMULU", "CIGEDE", "MUHARA", "BARANANGSIANG", "CIKEMBANG", "CIPUTRAHAJI", "GUNUNG PUTRI", "WANGUNDIREJA", "LAKSANA HARJA", "PARAKAN HAJI"];

        tbody.innerHTML = data.map((item, index) => {
            let namaAsli = item.bendungan_dan_foto || "-";
            let namaHanya = namaAsli.split(' (')[0].toUpperCase();
            let namaTampilan = namaHanya.startsWith("BENDUNG") ? namaHanya : "BENDUNG " + namaHanya;
            
            let idx = daftar.findIndex(d => namaAsli.toUpperCase().includes(d));
            let imageNum = idx + 1;
            if (imageNum === 9) imageNum = 10; else if (imageNum === 10) imageNum = 9;

            let fotoUrl = (idx !== -1) ? `img/${imageNum}.jpeg` : 'https://via.placeholder.com/100x70?text=No+Photo';

            return `
            <tr>
                <td>${index + 1}</td>
                <td>
                    <div class="nama-foto-cell">
                        <img src="${fotoUrl}" class="img-admin">
                        <strong>${namaTampilan}</strong>
                    </div>
                </td>
                <td>${item.kebutuhan || 0}</td>
                <td>${item.ketersediaan || 0}</td>
                <td>${item.selisih || 0}</td>
                <td>${item.luas_layanan || 0}</td>
                <td>${item.pengolahan_tanah || 0}</td>
                <td>${item.pertumbuhan || 0}</td>
                <td>${item.panen || 0}</td>
                <td style="background:${item.keterangan === 'CUKUP' ? '#e8f5e9' : '#ffebee'}">
                    <strong>${item.keterangan || '-'}</strong>
                </td>
                <td class="col-aksi">
                    <button class="btn-red" onclick="hapusData(${item.id})">X</button>
                </td>
            </tr>`;
        }).join('');
    }

    async function hapusData(id) {
        if (confirm("Hapus data?")) {
            await _supabase.from('laporan_air').delete().eq('id', id);
            muatData();
        }
    }

    window.onload = muatData;
</script>
</body>
</html>
