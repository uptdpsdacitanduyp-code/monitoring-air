<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rekap Data CAI TEPI SAWAH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        
        /* HEADER REKAP */
        .header-admin { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 3px solid #2196F3; padding-bottom: 20px; }
        .logo-admin { width: 80px; height: 80px; object-fit: contain; }
        .title-admin { display: flex; flex-direction: column; }
        .title-admin h2 { margin: 0; color: #1a237e; text-transform: uppercase; font-size: 24px; }
        
        /* FOTO DI TABEL */
        .admin-nama-flex { display: flex; align-items: center; gap: 10px; text-align: left; }
        .img-admin-mini { 
            width: 60px; height: 40px; 
            object-fit: cover; border-radius: 4px; border: 1px solid #ccc;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 11px; word-wrap: break-word; }
        th { background: #2196F3; color: white; text-transform: uppercase; }
        tr:nth-child(even) { background-color: #f2f7ff; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; font-size: 13px; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-outline { background: white; border: 1px solid #ddd; color: #333; }

        @media print {
            .btn, .filter-box, .col-aksi { display: none !important; }
            th { background: #2196F3 !important; color: white !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-admin">
        <img src="img/logo-uptd.png" alt="Logo" class="logo-admin" onerror="this.src='https://via.placeholder.com/80?text=PSDA'">
        <div class="title-admin">
            <h2>REKAP DATA CAI TEPI SAWAH</h2>
            <p style="margin:0; font-weight:bold;">UPTD PSDA WS CITANDUY</p>
        </div>
    </div>
    
    <div style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
        <a href="index.html" class="btn btn-outline">← KEMBALI KE INPUT</a>
        <button class="btn btn-blue" onclick="window.print()">CETAK LAPORAN</button>
        <button class="btn btn-red" onclick="hapusSemuaData()">KOSONGKAN REKAP</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="70px">TANGGAL</th>
                <th width="180px">NAMA BANGUNAN & FOTO</th>
                <th>BUTUH</th>
                <th>SEDIA</th>
                <th>+/-</th>
                <th>LUAS</th>
                <th>KET</th>
                <th width="60px" class="col-aksi">AKSI</th>
            </tr>
        </thead>
        <tbody id="adminBody">
            <tr><td colspan="8">Memuat data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = 'https://bgreqgputsaocwaloirj.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncmVxZ3B1dHNhb2N3YWxvaXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk0NjIsImV4cCI6MjA5MDQzNTQ2Mn0.v4npuC4Pw3ftAuL4p7MH1HQNppBrVqWnc_zWv40JrDg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Daftar ini harus sama urutannya dengan di index.html
    const daftarBendung = ["CIMULU", "CIGEDE", "MUHARA", "BARANANGSIANG", "CIKEMBANG", "CIPUTRAHAJI", "GUNUNG PUTRI", "WANGUNDIREJA", "LAKSANA HARJA", "PARAKAN HAJI"];

    async function muatData() {
        const tbody = document.getElementById('adminBody');
        const { data, error } = await _supabase.from('laporan_air').select('*').order('tanggal', { ascending: false });

        if (error) {
            tbody.innerHTML = `<tr><td colspan="8">Gagal muat data</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(item => {
            // Logika mencari nomor foto berdasarkan nama bendungan
            const namaMurni = (item.bendungan_dan_foto || "").toUpperCase();
            const indexFoto = daftarBendung.indexOf(namaMurni) + 1;
            const urlFoto = indexFoto > 0 ? `img/${indexFoto}.jpeg` : `img/default.jpeg`;

            return `
                <tr>
                    <td>${item.tanggal}</td>
                    <td>
                        <div class="admin-nama-flex">
                            <img src="${urlFoto}" class="img-admin-mini" onerror="this.src='https://via.placeholder.com/60x40?text=No+Img'">
                            <strong>${namaMurni}</strong>
                        </div>
                    </td>
                    <td>${item.kebutuhan}</td>
                    <td>${item.ketersediaan}</td>
                    <td style="font-weight:bold;">${item.selisih}</td>
                    <td>${item.luas_layanan}</td>
                    <td>${item.keterangan}</td>
                    <td class="col-aksi">
                        <button class="btn btn-red" style="padding:4px 8px; font-size:10px;" onclick="hapusData(${item.id})">Hapus</button>
                    </td>
                </tr>`;
        }).join('');
    }

    async function hapusData(id) {
        if (confirm("Hapus data ini?")) {
            await _supabase.from('laporan_air').delete().eq('id', id);
            muatData();
        }
    }

    async function hapusSemuaData() {
        if (confirm("Yakin hapus SEMUA data?")) {
            await _supabase.from('laporan_air').delete().neq('id', 0);
            muatData();
        }
    }

    window.onload = muatData;
</script>
</body>
</html>
