<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rekap Data CAI TEPI SAWAH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        
        /* HEADER REKAP */
        .header-admin { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 3px solid #2196F3; padding-bottom: 20px; }
        .logo-admin { width: 80px; height: 80px; object-fit: contain; }
        .title-admin { display: flex; flex-direction: column; }
        .title-admin h2 { margin: 0; color: #1a237e; text-transform: uppercase; font-size: 24px; }
        .title-admin p { margin: 0; color: #444; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 11px; word-wrap: break-word; }
        th { background: #2196F3; color: white; text-transform: uppercase; height: 50px; }
        tr:nth-child(even) { background-color: #f2f7ff; }
        
        .filter-box { margin-bottom: 20px; padding: 15px; background: #e3f2fd; border-radius: 8px; display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        
        .status-cukup { color: #006100; font-weight: bold; background: #c6efce; padding: 3px 6px; border-radius: 4px; }
        .status-kurang { color: #9c0006; font-weight: bold; background: #ffc7ce; padding: 3px 6px; border-radius: 4px; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; font-size: 13px; transition: 0.3s; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-green { background: #3ecf8e; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-outline { background: white; border: 1px solid #ddd; color: #333; }
        .btn-sm { padding: 5px 8px; font-size: 10px; }

        @media print {
            .filter-box, .btn, a, .col-aksi, .nav-buttons { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            body { background: white; padding: 0; }
            th { background: #2196F3 !important; color: white !important; -webkit-print-color-adjust: exact; }
            .header-admin { border-bottom: 2px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-admin">
        <img src="img/logo-uptd.png" alt="Logo UPTD" class="logo-admin" onerror="this.src='https://via.placeholder.com/80?text=PSDA'">
        <div class="title-admin">
            <h2>REKAPITULASI DATA CAI TEPI SAWAH</h2>
            <p>UPTD PSDA WS CITANDUY</p>
        </div>
    </div>
    
    <div class="nav-buttons" style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
        <a href="index.html" class="btn btn-outline">← KEMBALI KE INPUT</a>
        <button class="btn btn-blue" onclick="window.print()">CETAK LAPORAN (PDF)</button>
        <button class="btn btn-red" onclick="hapusSemuaData()">KOSONGKAN REKAP</button>
    </div>

    <div class="filter-box">
        <label style="font-weight: bold;">Filter Tanggal Laporan: </label>
        <input type="date" id="filterTgl" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
        <button class="btn btn-green" onclick="muatData()">CARI DATA</button>
        <button class="btn btn-outline" onclick="resetFilter()">RESET</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="70px">TANGGAL</th>
                <th width="140px">NAMA BANGUNAN</th>
                <th>KEBUTUHAN (m³/s)</th>
                <th>SEDIA (m³/s)</th>
                <th>+/- DEBIT</th>
                <th>LUAS (HA)</th>
                <th>OLAH TANAH</th>
                <th>TUMBUH</th>
                <th>PANEN</th>
                <th width="90px">KET</th>
                <th width="60px" class="col-aksi">AKSI</th>
            </tr>
        </thead>
        <tbody id="adminBody">
            <tr><td colspan="11">Memuat data... silakan tunggu.</td></tr>
        </tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = 'https://bgreqgputsaocwaloirj.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncmVxZ3B1dHNhb2N3YWxvaXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk0NjIsImV4cCI6MjA5MDQzNTQ2Mn0.v4npuC4Pw3ftAuL4p7MH1HQNppBrVqWnc_zWv40JrDg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function muatData() {
        const filter = document.getElementById('filterTgl').value;
        const tbody = document.getElementById('adminBody');
        
        tbody.innerHTML = `<tr><td colspan="11">Sedang mengambil data...</td></tr>`;

        // Mengambil data urut berdasarkan tanggal terbaru
        let query = _supabase.from('laporan_air').select('*').order('tanggal', { ascending: false });

        if (filter) {
            query = query.eq('tanggal', filter);
        }

        const { data, error } = await query;

        if (error) {
            alert("Gagal mengambil data: " + error.message);
            tbody.innerHTML = `<tr><td colspan="11" style="color:red">Error: ${error.message}</td></tr>`;
            return;
        }

        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="11">Tidak ada data untuk tanggal ini.</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(item => {
            const statusClass = (item.keterangan === 'CUKUP') ? 'status-cukup' : 'status-kurang';
            return `
                <tr>
                    <td>${formatTanggal(item.tanggal)}</td>
                    <td><strong>${item.bendungan_dan_foto || item.nama_bendung || '-'}</strong></td>
                    <td>${parseFloat(item.kebutuhan || 0).toFixed(2)}</td>
                    <td>${parseFloat(item.ketersediaan || 0).toFixed(2)}</td>
                    <td style="font-weight:bold; color:${item.selisih < 0 ? '#9c0006' : '#006100'}">
                        ${item.selisih > 0 ? '+' : ''}${parseFloat(item.selisih || 0).toFixed(2)}
                    </td>
                    <td>${parseFloat(item.luas_layanan || 0).toFixed(2)}</td>
                    <td>${parseFloat(item.pengolahan_tanah || 0).toFixed(2)}</td>
                    <td>${parseFloat(item.pertumbuhan || 0).toFixed(2)}</td>
                    <td>${parseFloat(item.panen || 0).toFixed(2)}</td>
                    <td><span class="${statusClass}">${item.keterangan || '-'}</span></td>
                    <td class="col-aksi">
                        <button class="btn btn-red btn-sm" onclick="hapusData(${item.id})">Hapus</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function hapusData(id) {
        if (confirm("Hapus baris data ini?")) {
            const { error } = await _supabase.from('laporan_air').delete().eq('id', id);
            if (error) alert("Gagal menghapus: " + error.message);
            else muatData();
        }
    }

    async function hapusSemuaData() {
        const password = prompt("Ketik 'KONFIRMASI' untuk menghapus SEMUA rekap data:");
        if (password === "KONFIRMASI") {
            const { error } = await _supabase.from('laporan_air').delete().neq('id', 0);
            if (error) alert("Gagal membersihkan database: " + error.message);
            else {
                alert("Database berhasil dikosongkan.");
                muatData();
            }
        }
    }

    function formatTanggal(tgl) {
        if(!tgl) return "-";
        const d = new Date(tgl);
        return d.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: '2-digit' });
    }

    function resetFilter() {
        document.getElementById('filterTgl').value = "";
        muatData();
    }

    window.onload = muatData;
</script>
</body>
</html>
