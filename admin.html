<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rekap Data Air & Lahan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1550px; margin: auto; }
        
        /* Header Logo Style sesuai gambar */
        .header-logo { text-align: center; margin-bottom: 20px; border-bottom: 3px solid #2196F3; padding-bottom: 15px; }
        .header-logo img { width: 70px; height: auto; margin-bottom: 10px; }
        .header-logo h1 { margin: 0; color: #0d47a1; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .header-logo p { margin: 2px 0; color: #555; font-size: 14px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 10px; word-wrap: break-word; }
        th { background: #e3f2fd; color: #333; text-transform: uppercase; height: 45px; }
        
        .nama-foto-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        
        /* --- UKURAN GAMBAR DIPERBESAR DI SINI --- */
        .img-admin { 
            width: 130px; /* Diperbesar dari 85px */
            height: 90px; /* Diperbesar dari 60px */
            object-fit: cover; 
            border-radius: 6px; 
            border: 2px solid #ccc; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .filter-box { margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #ddd; display: flex; gap: 10px; align-items: center; justify-content: center; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-outline { background: white; border: 1px solid #ddd; color: #333; }

        /* --- CSS PRINT OPTIMIZATION --- */
        @media print {
            @page { size: A4 landscape; margin: 0.5cm; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            .no-print, .btn, .col-aksi, .filter-box { display: none !important; }
            table { width: 100%; border: 1px solid #000; }
            th { background: #f2f2f2 !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
            td { font-size: 9px; padding: 4px; }
            .img-admin { width: 110px; height: 75px; border: 1px solid #000; }
            .nama-foto-cell strong { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="img/g2.png">
        <h1>CAI TEPI SAWAH</h1>
        <p>UPTD PSDA WS CITANDUY</p>
    </div>

    <div class="no-print" style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
        <a href="index.html" class="btn btn-outline">← Form Input</a>
        <button class="btn btn-blue" onclick="window.print()">Cetak PDF (Landscape)</button>
        <button class="btn btn-red" onclick="hapusSemuaData()">Hapus Semua Data</button>
    </div>

    <div class="filter-box no-print">
        <label><b>Pilih Tanggal:</b></label>
        <input type="date" id="filterTgl">
        <button class="btn btn-blue" onclick="muatData()">Cari Data</button>
        <button class="btn btn-outline" onclick="resetFilter()">Reset</button>
    </div>

    <div style="overflow-x: auto;">
        <table id="tabelRekap">
            <thead>
                <tr>
                    <th width="30px">NO</th>
                    <th width="190px">NAMA BENDUNG & FOTO</th> <th>KEBUTUHAN<br>(l/dtk)</th>
                    <th>KETERSEDIAAN<br>(l/dtk)</th>
                    <th>+/-</th>
                    <th>LUAS LAYANAN<br>(HA)</th>
                    <th>OLAH TANAH</th>
                    <th>TUMBUH</th>
                    <th>PANEN</th>
                    <th width="70px">KET</th>
                    <th width="50px" class="col-aksi">AKSI</th>
                </tr>
            </thead>
            <tbody id="adminBody">
                <tr><td colspan="11">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bgreqgputsaocwaloirj.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncmVxZ3B1dHNhb2N3YWxvaXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk0NjIsImV4cCI6MjA5MDQzNTQ2Mn0.v4npuC4Pw3ftAuL4p7MH1HQNppBrVqWnc_zWv40JrDg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function muatData() {
        const filter = document.getElementById('filterTgl').value;
        const tbody = document.getElementById('adminBody');
        tbody.innerHTML = `<tr><td colspan="11">Sedang memproses...</td></tr>`;

        let query = _supabase.from('laporan_air').select('*').order('tanggal', { ascending: false });
        if (filter) query = query.eq('tanggal', filter);

        const { data, error } = await query;
        if (error) { 
            tbody.innerHTML = `<tr><td colspan="11" style="color:red">Error: ${error.message}</td></tr>`; 
            return; 
        }

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="11">Tidak ada data untuk tanggal ini.</td></tr>`;
            return;
        }

        const daftar = ["CIMULU", "CIGEDE", "MUHARA", "BARANANGSIANG", "CIKEMBANG", "CIPUTRAHAJI", "GUNUNG PUTRI", "WANGUNDIREJA", "LAKSANA HARJA", "PARAKAN HAJI"];

        tbody.innerHTML = data.map((item, index) => {
            let namaAsli = item.bendungan_dan_foto || "-";
            let namaHanya = namaAsli.split(' (')[0].toUpperCase();
            let namaTampilan = namaHanya.startsWith("BENDUNG") ? namaHanya : "BENDUNG " + namaHanya;
            
            let idx = daftar.findIndex(d => namaAsli.toUpperCase().includes(d));
            let imageNum = idx + 1;
            if (imageNum === 9) imageNum = 10; else if (imageNum === 10) imageNum = 9;

            let fotoUrl = (idx !== -1) ? `img/${imageNum}.jpeg` : 'https://via.placeholder.com/100x70?text=No+Photo';

            return `
            <tr>
                <td>${index + 1}</td>
                <td>
                    <div class="nama-foto-cell">
                        <img src="${fotoUrl}" class="img-admin" onerror="this.src='https://via.placeholder.com/100x70?text=No+Photo'">
                        <strong style="font-size:11px;">${namaTampilan}</strong>
                    </div>
                </td>
                <td>${parseFloat(item.kebutuhan || 0).toFixed(2)}</td>
                <td>${parseFloat(item.ketersediaan || 0).toFixed(2)}</td>
                <td style="font-weight:bold; color:${item.selisih < 0 ? 'red' : 'black'}">
                    ${item.selisih > 0 ? '+' : ''}${parseFloat(item.selisih || 0).toFixed(2)}
                </td>
                <td>${parseFloat(item.luas_layanan || 0).toFixed(2)}</td>
                <td>${parseFloat(item.pengolahan_tanah || 0).toFixed(2)}</td>
                <td>${parseFloat(item.pertumbuhan || 0).toFixed(2)}</td>
                <td>${parseFloat(item.panen || 0).toFixed(2)}</td>
                <td style="background:${item.keterangan === 'CUKUP' ? '#e8f5e9' : '#ffebee'}">
                    <b style="color:${item.keterangan === 'CUKUP' ? '#2e7d32' : '#c62828'}">${item.keterangan || '-'}</b>
                </td>
                <td class="col-aksi">
                    <button class="btn-red" style="padding:5px; border-radius:3px; border:none; color:white; cursor:pointer;" onclick="hapusData(${item.id})">Hapus</button>
                </td>
            </tr>`;
        }).join('');
    }

    function resetFilter() {
        document.getElementById('filterTgl').value = "";
        muatData();
    }

    window.onload = muatData;
</script>
</body>
</html>
