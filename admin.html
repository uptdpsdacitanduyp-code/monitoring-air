<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rekap Data CAI TEPI SAWAH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        
        .header-admin { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 3px solid #2196F3; padding-bottom: 20px; }
        .logo-admin { width: 80px; height: 80px; object-fit: contain; }
        
        /* PENGATURAN FOTO DI TABEL */
        .admin-nama-flex { display: flex; align-items: center; gap: 12px; text-align: left; }
        .img-admin-mini { 
            width: 80px; /* Ukuran sedikit lebih besar agar jelas */
            height: 55px; 
            object-fit: cover; 
            border-radius: 6px; 
            border: 2px solid #2196F3;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 13px; }
        th { background: #2196F3; color: white; text-transform: uppercase; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 13px; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-red { background: #f44336; color: white; }

        @media print {
            .btn, .filter-box { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-admin">
        <img src="img/logo-uptd.png" class="logo-admin" onerror="this.src='https://via.placeholder.com/80?text=LOGO'">
        <div style="text-align:left">
            <h2 style="margin:0; color:#1a237e;">REKAP DATA CAI TEPI SAWAH</h2>
            <p style="margin:0; font-weight:bold;">UPTD PSDA WS CITANDUY</p>
        </div>
    </div>
    
    <div style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
        <a href="index.html" class="btn btn-blue" style="background:#666">← KEMBALI</a>
        <button class="btn btn-blue" onclick="window.print()">🖨️ CETAK PDF</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="10%">TANGGAL</th>
                <th width="30%">NAMA BANGUNAN & FOTO</th>
                <th>BUTUH</th>
                <th>SEDIA</th>
                <th>+/-</th>
                <th width="10%">AKSI</th>
            </tr>
        </thead>
        <tbody id="adminBody">
            <tr><td colspan="6">Memuat data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // PASTIKAN URL & KEY INI SAMA DENGAN DI INDEX.HTML
    const SUPABASE_URL = 'https://bgreqgputsaocwaloirj.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncmVxZ3B1dHNhb2N3YWxvaXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk0NjIsImV4cCI6MjA5MDQzNTQ2Mn0.v4npuC4Pw3ftAuL4p7MH1HQNppBrVqWnc_zWv40JrDg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // URUTAN INI HARUS SAMA PERSIS DENGAN INDEX.HTML UNTUK MENENTUKAN NOMOR FOTO
    const daftarBendung = ["CIMULU", "CIGEDE", "MUHARA", "BARANANGSIANG", "CIKEMBANG", "CIPUTRAHAJI", "GUNUNG PUTRI", "WANGUNDIREJA", "LAKSANA HARJA", "PARAKAN HAJI"];

    async function muatData() {
        const tbody = document.getElementById('adminBody');
        const { data, error } = await _supabase.from('laporan_air').select('*').order('tanggal', { ascending: false });

        if (error || !data) {
            tbody.innerHTML = `<tr><td colspan="6">Data tidak ditemukan.</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(item => {
            // Ambil nama dari database, lalu cari posisinya di daftarBendung
            const namaDb = (item.bendungan_dan_foto || item.nama_bendung || "").toUpperCase();
            const indexFoto = daftarBendung.indexOf(namaDb) + 1; // +1 karena file foto mulai dari 1.jpeg
            
            // Jika ketemu di daftar, pakai img/X.jpeg. Jika tidak, pakai placeholder.
            const urlFoto = indexFoto > 0 ? `img/${indexFoto}.jpeg` : `https://via.placeholder.com/80x55?text=No+Img`;

            return `
                <tr>
                    <td>${item.tanggal}</td>
                    <td>
                        <div class="admin-nama-flex">
                            <img src="${urlFoto}" class="img-admin-mini" onerror="this.src='https://via.placeholder.com/80x55?text=Error'">
                            <strong>${namaDb}</strong>
                        </div>
                    </td>
                    <td>${item.kebutuhan}</td>
                    <td>${item.ketersediaan}</td>
                    <td style="font-weight:bold; color:${item.selisih < 0 ? 'red' : 'green'}">${item.selisih}</td>
                    <td>
                        <button class="btn btn-red" style="padding:5px 10px" onclick="hapusData(${item.id})">Hapus</button>
                    </td>
                </tr>`;
        }).join('');
    }

    async function hapusData(id) {
        if (confirm("Hapus data ini?")) {
            await _supabase.from('laporan_air').delete().eq('id', id);
            muatData();
        }
    }

    window.onload = muatData;
</script>
</body>
</html>
